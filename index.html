<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NBKR Institute of Science & Technology – Autonomous Engineering College affiliated to JNTUA, NAAC 'A' Grade, NBA Accredited, Vidyanagar, Andhra Pradesh.">
    <meta name="keywords" content="NBKRIST, NBKR, Engineering College, JNTUA, NAAC, NBA, Andhra Pradesh, Vidyanagar">
    <title>NBKR Institute of Science & Technology — Official Website</title>
    <!-- We will rely on public/ folder for images later, but for dev wait -->
    <link rel="shortcut icon" href="/images/Emb.jpg" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/nbkr.css">
    <style>
        /* To keep my admin dashboard somewhat looking good */
        .admin-layout { display: flex; min-height: 100vh; background-color: var(--bg-alt); }
        .admin-sidebar { width: 260px; background-color: var(--primary); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 40; }
        .admin-sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .admin-sidebar-header h2 { color: white; font-size: 1.25rem; margin: 0; }
        .admin-nav { padding: 1rem 0; flex: 1; }
        .admin-nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: #cbd5e1; font-weight: 500; transition: all 0.2s; }
        .admin-nav-item:hover, .admin-nav-item.active { color: white; background-color: rgba(255,255,255,0.05); border-left: 3px solid var(--accent); }
        .admin-main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; }
        .admin-header { height: 70px; background-color: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; justify-content: space-between; }
        .admin-content { padding: 2rem; flex: 1; }
        .card { background-color: white; border-radius: 8px; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); border: 1px solid var(--border); overflow: hidden; }
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); overflow: auto; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 1rem 1.5rem; text-align: left; border-bottom: 1px solid var(--border); }
        .modal { background-color: white; border-radius: 8px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-overlay { position: fixed; inset: 0; background-color: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
